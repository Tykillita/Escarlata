appId: com.escarlata.desktop
productName: Escarlata
directories:
  output: release
files:
  - out/**
  - package.json
  - "!**/*.map"
extraResources:
  - from: ui/public/EscarlataAppIcon.ico
    to: EscarlataAppIcon.ico
  - from: ui/public/EscarlataTray.png
    to: EscarlataTray.png
asar: true
asarUnpack:
  - node_modules/sql.js/dist/**
  - node_modules/@openai/codex-*/**
win:
  icon: ui/public/EscarlataAppIcon.ico
  signAndEditExecutable: true
  target: [nsis, portable]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: Escarlata-Setup-${version}.${ext}
portable:
  artifactName: Escarlata-Portable-${version}.${ext}
